name: Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux64:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        repository: danielga/garrysmod_common
        path: 'garrysmod_common'
        ref: x86-64-support-sourcesdk
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libopus-dev unzip
    - name: Install Premake
      run: |
        curl --fail --location --retry 5 --retry-all-errors https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-src.zip -o "$RUNNER_TEMP/premake-src.zip"
        unzip -q "$RUNNER_TEMP/premake-src.zip" -d "$RUNNER_TEMP/premake-src"
        PREMAKE_DIR="$(dirname "$(find "$RUNNER_TEMP/premake-src" -name Bootstrap.mak -type f | head -n 1)")"
        make -C "$PREMAKE_DIR" -f Bootstrap.mak linux
        PREMAKE_BIN="$(find "$PREMAKE_DIR/bin" -name premake5 -type f | head -n 1)"
        cp "$PREMAKE_BIN" ./premake5
        chmod +x ./premake5
        test -x ./premake5
    - name: Generate Makefiles
      run: |
        ./premake5 --gmcommon=garrysmod_common gmake
    - name: Build Linux x86_64
      run: |
        cd projects/linux/gmake
        make help | tee make-help.txt
        mapfile -t configs < <(awk '
          BEGIN { in_configs = 0 }
          /^CONFIGURATIONS:/ { in_configs = 1; next }
          /^TARGETS:/ { in_configs = 0 }
          in_configs && $1 != "" { print $1 }
        ' make-help.txt | sort -u)
        printf 'Generated make configs:\n'
        printf '  %s\n' "${configs[@]}"
        config="$(printf '%s\n' "${configs[@]}" | grep -Ei 'releasewithsymbols.*(x86_64|x64|linux64|64)' | head -n 1 || true)"
        if [ -z "$config" ]; then
          config="$(printf '%s\n' "${configs[@]}" | grep -Ei 'release.*(x86_64|x64|linux64|64)' | head -n 1 || true)"
        fi
        if [ -z "$config" ]; then
          config="$(printf '%s\n' "${configs[@]}" | grep -Ei 'releasewithsymbols' | head -n 1 || true)"
        fi
        if [ -z "$config" ]; then
          printf 'No usable Linux x86_64 release config found.\n'
          exit 1
        fi
        printf 'Building config: %s\n' "$config"
        make "config=$config"
    - name: Verify Linux x86_64 module
      run: |
        MODULE_PATH="$(find projects/linux/gmake -name gmsv_eightbit_linux64.dll -type f | head -n 1)"
        mkdir -p artifacts
        if [ -z "$MODULE_PATH" ]; then
          find projects/linux/gmake -type f -name 'gmsv_eightbit*' -print
          exit 1
        fi
        file "$MODULE_PATH" | tee artifacts/module-file.txt
        grep -q "ELF 64-bit" artifacts/module-file.txt
        cp "$MODULE_PATH" artifacts/gmsv_eightbit_linux64.dll
    - name: Upload Linux x86_64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: gmsv_eightbit_linux64.dll
        path: artifacts/gmsv_eightbit_linux64.dll
        if-no-files-found: error
        retention-days: 90
    - name: Attach Linux x86_64 module to release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/gmsv_eightbit_linux64.dll

  build-windows:
    runs-on: windows-2019
    steps:
    - uses: actions/checkout@v4
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        repository: danielga/garrysmod_common
        path: 'garrysmod_common'
        ref: x86-64-support-sourcesdk
    - name: Install Premake
      run: |
         curl -L https://github.com/premake/premake-core/releases/download/v5.0.0-beta7/premake-5.0.0-beta7-windows.zip -o premake.zip
         tar -xf premake.zip
    - name: Generate Project
      run: |
        ./premake5.exe --gmcommon=garrysmod_common vs2019
    - name: Build
      run: |
        cd projects/windows/vs2019
        & "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\MSBuild\Current\Bin\msbuild.exe" /p:Configuration=ReleaseWithSymbols /p:Platform=Win32 eightbit.sln
    - uses: actions/upload-artifact@v4
      with:
        name: gmsv_eightbit_windows.dll
        path: projects/windows/vs2019/x86/ReleaseWithSymbols/gmsv_eightbit_win32.dll
        if-no-files-found: error
    - name: Build 64
      run: |
        cd projects/windows/vs2019
        & "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\MSBuild\Current\Bin\msbuild.exe" /p:Configuration=ReleaseWithSymbols /p:Platform=x64 eightbit.sln
    - uses: actions/upload-artifact@v4
      with:
        name: gmsv_eightbit_win64.dll
        path: projects/windows/vs2019/x86_64/ReleaseWithSymbols/gmsv_eightbit_win64.dll
        if-no-files-found: error
